<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <!-- Георгиевская лента -->
    <path d="M40,100 C40,70 70,40 100,40 C130,40 160,70 160,100 C160,130 130,160 100,160 C70,160 40,130 40,100" 
          fill="none" stroke="#FFD700" stroke-width="8"/>
    
    <!-- Звезда -->
    <path d="M100,30 L110,60 L140,60 L115,80 L125,110 L100,90 L75,110 L85,80 L60,60 L90,60 Z" 
          fill="#E31837"/>
    
    <!-- Текст "9 МАЯ" -->
    <text x="100" y="140" 
          font-family="Arial" 
          font-size="24" 
          font-weight="bold" 
          fill="#E31837" 
          text-anchor="middle">9 МАЯ</text>
    
    <!-- Декоративные элементы -->
    <circle cx="100" cy="100" r="90" 
            fill="none" 
            stroke="#FFD700" 
            stroke-width="2" 
            stroke-dasharray="5,5"/>
    
    <circle cx="100" cy="100" r="70" 
            fill="none" 
            stroke="#E31837" 
            stroke-width="2" 
            stroke-dasharray="3,3"/>
</svg> 